server {
    listen 80;
    server_name shengchanglimin.com www.shengchanglimin.com;
    charset utf-8;

    # 1) 强制 /h5 → /h5/（无尾斜杠补全）
    location = /h5 {
        return 301 /h5/;
    }

    # 2) H5 静态资源（assets/static）：长缓存，找不到直接404
    location ^~ /h5/assets/ {
        root /app/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /h5/static/ {
        root /app/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 3) H5 SPA 路由主入口
    #    - root /app/ + 路径 /h5/xxx → 实际文件 /app/h5/xxx ✅
    #    - index.html 不缓存（用 no-cache，iOS Safari 兼容）
    #    - 前端路由 fallback 到 /h5/index.html（绝对路径，Nginx 内部转发）
    location ^~ /h5/ {
        root /app/;
        index index.html;

        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";

        # fallback 用命名 location，避免 try_files 触发内部重定向循环（iOS 超时根因）
        try_files $uri $uri/ @h5_fallback;
    }

    # H5 SPA fallback（命名 location，不会再触发 location 匹配）
    location @h5_fallback {
        root /app/;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files /h5/index.html =404;
    }

    # 4) PC 端全站配置
    location / {
        root /app/dist;
        index index.html;

        # 移动端自动跳 H5（覆盖所有 iOS / Android 设备）
        if ($http_user_agent ~* "(iphone|ipod|ipad|android|mobile|blackberry|webos|windows phone)") {
            return 302 /h5/;
        }

        # PC SPA 路由 fallback
        try_files $uri $uri/ /index.html;
    }
}
